<!DOCTYPE html>
<html>

<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gestion_cliente">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png" />

  <title>gestion_cliente</title>
  <link rel="manifest" href="manifest.json">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #1E293B;
    }

    .dots-spinner {
      display: flex;
      gap: 10px;
      margin-top: 25px;
      justify-content: center;
      align-items: center;
    }

    .dots-spinner div {
      width: 12px;
      height: 12px;
      background-color: rgba(100, 181, 246, 0.6);
      border-radius: 50%;
      animation: bounce 1.2s infinite ease-in-out;
    }

    .dots-spinner div:nth-child(2) {
      animation-delay: 0.2s;
    }

    .dots-spinner div:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce {
      0%, 80%, 100% {
        transform: scale(0);
        opacity: 0.3;
      }
      40% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>

  <!-- SPLASH -->
  <div id="splash"
    style="
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      background: linear-gradient(135deg, #1E293B, #334155 60%, #64B5F6);
      z-index:9999;
    ">

    <img src="images/Icono_AlphaApp.png"
      alt="Logo"
      style="width:180px;height:auto;margin-bottom:15px;">

    <div class="dots-spinner">
      <div></div>
      <div></div>
      <div></div>
    </div>

  </div>

  <!-- Flutter -->
  <script src="flutter_bootstrap.js" defer></script>

  <!-- Ocultar splash -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash');
      if (splash) {
        splash.style.transition = 'opacity 0.4s ease';
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 400);
      }
    });
  </script>

</body>

</html>
