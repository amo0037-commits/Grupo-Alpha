<!DOCTYPE html>
<html>

<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="gestion_cliente">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png" />

  <title>gestion_cliente</title>
  <link rel="manifest" href="manifest.json">

  <<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.css" />
  <script defer src="https://cdnjs.cloudflare.com/ajax/libs/croppie/2.6.5/croppie.min.js"></script>
</head>

<body>
  <!-- Splash screen visible mientras Flutter carga -->
  <div id="splash"
    style="position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;background: linear-gradient(to bottom, #E0E3E7, #64B5F6); z-index:9999;">
    <img src="images/Icono_AlphaApp.png" alt="Logo" style="width:250px;height:200px;">

    <div class="gradient-spinner"></div>

    <div class="dots-spinner">
      <div></div>
      <div></div>
      <div></div>
    </div>

    <style>
      .dots-spinner {
        display: flex;
        gap: 10px;
        margin-top: 30px;
        justify-content: center;
        align-items: center;
      }

      .dots-spinner div {
        width: 20px;
        height: 20px;
        background-color: #888888;
        border-radius: 50%;
        animation: bounce 1.4s infinite ease-in-out both;
      }

      .dots-spinner div:nth-child(1) {
        animation-delay: 0s;
      }

      .dots-spinner div:nth-child(2) {
        animation-delay: 0.2s;
      }

      .dots-spinner div:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {

        0%,
        80%,
        100% {
          transform: scale(0);
        }

        40% {
          transform: scale(1);
        }
      }
    </style>
  </div>

  <!-- Flutter web bootstrap -->
  <script src="flutter_bootstrap.js" defer></script>

  <!-- Ocultar splash cuando Flutter dibuje la primera pantalla -->
  <script>
    window.addEventListener('flutter-first-frame', function () {
      const splash = document.getElementById('splash');
      if (splash) splash.style.display = 'none';
    });
  </script>

  <style>
    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }
  </style>
</body>

</html>
